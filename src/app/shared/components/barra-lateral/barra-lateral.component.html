<aside class="barra-lateral">
  <!-- Logo Header -->
  <div class="barra-lateral__encabezado">
    <div class="barra-lateral__logo-contenedor">
      <div class="barra-lateral__logo-icono barra-lateral__logo-icono--imagen">
        <img src="logo-gastro.png" alt="Gastro SENA" class="barra-lateral__logo-img" />
      </div>
      <div class="barra-lateral__logo-texto">
        <h1 class="barra-lateral__titulo">GASTRO SENA</h1>
        <p class="barra-lateral__subtitulo">FICHA 3066489</p>
      </div>
    </div>
  </div>

  <!-- Navegación Principal -->
  <nav class="barra-lateral__navegacion">
    
    <!-- Grupo: Panel Principal -->
    <div class="barra-lateral__grupo">
      <p class="barra-lateral__etiqueta-grupo">Panel Principal</p>
      <a routerLink="/dashboard" routerLinkActive="barra-lateral__enlace--activo" class="barra-lateral__enlace">
        <lucide-icon name="layout-dashboard" class="barra-lateral__icono"></lucide-icon>
        <span class="barra-lateral__texto">Dashboard</span>
      </a>
    </div>

    <!-- Grupo: Gestión de Inventario -->
    <div class="barra-lateral__grupo">
      <p class="barra-lateral__etiqueta-grupo">Gestión de Inventario</p>
      <div class="barra-lateral__grupo-items">
        <a routerLink="/bienes" routerLinkActive="barra-lateral__enlace--activo" class="barra-lateral__enlace">
          <lucide-icon name="package-search" class="barra-lateral__icono"></lucide-icon>
          <span class="barra-lateral__texto">Gestión de Bienes</span>
        </a>
        <a routerLink="/prefacturas" routerLinkActive="barra-lateral__enlace--activo" class="barra-lateral__enlace barra-lateral__enlace--con-insignia">
          <lucide-icon name="scroll-text" class="barra-lateral__icono"></lucide-icon>
          <span class="barra-lateral__texto">Pre Facturas</span>
          <span class="barra-lateral__insignia">3</span>
        </a>
        <a routerLink="/gil-f014" routerLinkActive="barra-lateral__enlace--activo" class="barra-lateral__enlace barra-lateral__enlace--con-insignia">
          <lucide-icon name="file-text" class="barra-lateral__icono"></lucide-icon>
          <span class="barra-lateral__texto">Formato GIL-F-014</span>
          <span class="barra-lateral__insignia">5</span>
        </a>
        <a routerLink="/factura-global" routerLinkActive="barra-lateral__enlace--activo" class="barra-lateral__enlace">
          <lucide-icon name="receipt" class="barra-lateral__icono"></lucide-icon>
          <span class="barra-lateral__texto">Factura Global</span>
        </a>
      </div>
    </div>

    <!-- Grupo: Movimientos y Control -->
    <div class="barra-lateral__grupo">
      <p class="barra-lateral__etiqueta-grupo">Movimientos y Control</p>
      <div class="barra-lateral__grupo-items">
        <a routerLink="/entradas-salidas" routerLinkActive="barra-lateral__enlace--activo" class="barra-lateral__enlace">
          <lucide-icon name="arrow-right-left" class="barra-lateral__icono"></lucide-icon>
          <span class="barra-lateral__texto">Entradas y Salidas</span>
        </a>
        <a href="#" class="barra-lateral__enlace barra-lateral__enlace--con-insignia">
          <lucide-icon name="triangle-alert" class="barra-lateral__icono"></lucide-icon>
          <span class="barra-lateral__texto">Alertas de Stock</span>
          <span class="barra-lateral__insignia barra-lateral__insignia--alerta">23</span>
        </a>
      </div>
    </div>

    <!-- Grupo: Administración -->
    <div class="barra-lateral__grupo">
      <p class="barra-lateral__etiqueta-grupo">Administración</p>
      <div class="barra-lateral__grupo-items">
        <a href="#" class="barra-lateral__enlace">
          <lucide-icon name="wallet" class="barra-lateral__icono"></lucide-icon>
          <span class="barra-lateral__texto">Presupuesto</span>
        </a>
        <a href="#" class="barra-lateral__enlace">
          <lucide-icon name="landmark" class="barra-lateral__icono"></lucide-icon>
          <span class="barra-lateral__texto">Conciliación</span>
        </a>
      </div>
    </div>

  </nav>

  <!-- Footer de la barra lateral -->
  <div class="barra-lateral__pie">
    <a href="#" class="barra-lateral__enlace">
      <lucide-icon name="settings" class="barra-lateral__icono"></lucide-icon>
      <span class="barra-lateral__texto">Configuración</span>
    </a>
    <a href="#" class="barra-lateral__enlace">
      <lucide-icon name="user" class="barra-lateral__icono"></lucide-icon>
      <span class="barra-lateral__texto">Perfil</span>
    </a>
    <a href="#" class="barra-lateral__enlace barra-lateral__enlace--peligro">
      <lucide-icon name="log-out" class="barra-lateral__icono"></lucide-icon>
      <span class="barra-lateral__texto">Cerrar Sesión</span>
    </a>
  </div>
</aside>
